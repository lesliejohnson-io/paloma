<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paloma — evidence flow (embed)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
  #root { position: absolute; inset: 0; }
  @keyframes palomaBlink { 50% { opacity: 0; } }

  /* Hide the playback bar for embed. The bar is the last direct child of the
     Stage container. */
  #root > div > div:last-child {
    display: none !important;
  }
  /* Stage's canvas area uses flex:1; with the bar gone, it will fill the
     entire viewport. */
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scene.jsx"></script>

<script type="text/babel">
/* Always start from t=0 for embed — overwrite any persisted playhead so
   the first frame a Webflow visitor sees is the beginning of the loop. */
try { localStorage.removeItem('paloma-embed:t'); } catch (e) {}

function App() {
  return (
    <Stage
      width={1280}
      height={720}
      duration={28.6}
      background="#0a0a0a"
      loop={true}
      autoplay={true}
      persistKey="paloma-embed"
    >
      <PalomaScene/>
    </Stage>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
